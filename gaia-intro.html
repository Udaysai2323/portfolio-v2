<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="G.A.I.A System Initialization">
    <title>Initializing G.A.I.A</title>

    <!-- Intro styles (we add later) -->
    <link rel="stylesheet" href="gaia-intro.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= GAIA INTRO ================= -->
<div class="gaia-intro">

    <!-- Background layers (animated later) -->
    <div class="bg-layer base-bg"></div>
    <div class="bg-layer grid-bg"></div>
    <div class="bg-layer hud-bg"></div>

    <!-- Floating AI icons -->
    <div class="ai-objects">
        <i class="fas fa-robot"></i>
        <i class="fas fa-brain"></i>
        <i class="fas fa-microphone"></i>
        <i class="fas fa-hand-paper"></i>
        <i class="fas fa-microchip"></i>
    </div>

    <!-- ================= CENTER CONTENT ================= -->
    <div class="intro-center">

        <h1 class="gaia-title">G.A.I.A</h1>
        <p class="gaia-fullform">
            Gestural and Auditory Intelligent Assistant
        </p>

        <!-- System boot messages -->
        <div class="system-log">
            <p>Initializing AI core...</p>
            <p>Loading gesture module...</p>
            <p>Activating speech engine...</p>
            <p>System calibration in progress...</p>
        </div>

        <!-- Progress bar -->
        <div class="loader">
            <span class="loader-bar"></span>
        </div>

        <p class="status-text">SYSTEM STATUS: <span>BOOTING</span></p>

        <!-- Actions -->
        <div class="intro-actions">
            <a href="gaia.html" class="btn-enter">Enter G.A.I.A</a>
            <a href="gaia.html" class="btn-skip">Skip Intro</a>
        </div>

    </div>

</div>

<!-- ================= AUTO REDIRECT ================= -->
<script>
    // Auto-enter GAIA after intro (7 seconds)
    setTimeout(() => {
        window.location.href = "gaia.html";
    }, 7000);
</script>
<script src="gaia-intro.js"></script>

</body>
</html>
